<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Interactive Flipbook - Vobels</title>
    
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="shortcut icon" href="/favicon.svg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #2d2d44;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: white;
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .header p {
            color: #a0a0c0;
            font-size: 0.875rem;
        }

        #flipbook {
            background: #e8e8e8;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
            min-height: 500px;
            position: relative;
        }

        .toolbar {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .toolbar button {
            background: #3d3d5c;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .toolbar button:hover {
            background: #4d4d6e;
            transform: translateY(-1px);
        }

        .toolbar button:active {
            transform: translateY(1px);
        }

        .page-info {
            background: #3d3d5c;
            padding: 10px 20px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .fullscreen-btn {
            background: #3b82f6 !important;
        }

        .fullscreen-btn:hover {
            background: #2563eb !important;
        }

        .download-btn {
            background: #10b981 !important;
        }

        .download-btn:hover {
            background: #059669 !important;
        }

        .new-btn {
            background: #8b5cf6 !important;
        }

        .new-btn:hover {
            background: #7c3aed !important;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .container {
                padding: 12px;
            }
            
            .toolbar button {
                padding: 8px 12px;
                font-size: 12px;
            }
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Vobels Flipbook</h1>
            <p>Click or drag pages to flip | Fullscreen mode available</p>
        </div>
        
        <div id="flipbook">
            <div class="loading">
                <div class="spinner"></div>
                <p style="color: #666;">Loading your flipbook...</p>
            </div>
        </div>
        
        <div class="toolbar">
            <button id="prev-page">◀ Previous</button>
            <div class="page-info">
                Page <span id="current-page">1</span> of <span id="total-pages">...</span>
            </div>
            <button id="next-page">Next ▶</button>
            <button id="fullscreen-btn" class="fullscreen-btn">🖥️ Fullscreen</button>
            <button id="download-btn" class="download-btn">⬇️ Download PDF</button>
            <button id="new-flipbook" class="new-btn">📄 New Flipbook</button>
        </div>
    </div>

    <!-- Load libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
    
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        
        let pdfDoc = null;
        let pageCount = 0;
        let currentPage = 1;
        let currentPDFUrl = null;
        let pagesData = [];
        
        // Get PDF source from localStorage or URL params
        function getPDFSource() {
            const urlParams = new URLSearchParams(window.location.search);
            const pdfParam = urlParams.get('pdf');
            
            if (pdfParam) {
                return { type: 'url', source: pdfParam };
            }
            
            const sourceType = localStorage.getItem('flipbookSource');
            if (sourceType === 'upload') {
                const data = localStorage.getItem('tempFlipbookPDF');
                if (data) {
                    localStorage.removeItem('tempFlipbookPDF');
                    localStorage.removeItem('flipbookSource');
                    return { type: 'data', source: data };
                }
            } else if (sourceType === 'url') {
                const url = localStorage.getItem('tempFlipbookPDFUrl');
                if (url) {
                    localStorage.removeItem('tempFlipbookPDFUrl');
                    localStorage.removeItem('flipbookSource');
                    return { type: 'url', source: url };
                }
            }
            
            // Default fallback PDF
            return { type: 'url', source: 'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf' };
        }
        
        // Load PDF
        async function loadPDF() {
            const source = getPDFSource();
            const flipbookDiv = document.getElementById('flipbook');
            
            try {
                let loadingTask;
                
                if (source.type === 'data') {
                    // Handle data URL
                    const dataArray = source.source.split(',')[1];
                    const binaryString = atob(dataArray);
                    const bytes = new Uint8Array(binaryString.length);
                    for (let i = 0; i < binaryString.length; i++) {
                        bytes[i] = binaryString.charCodeAt(i);
                    }
                    loadingTask = pdfjsLib.getDocument({ data: bytes });
                    currentPDFUrl = null;
                } else {
                    loadingTask = pdfjsLib.getDocument(source.source);
                    currentPDFUrl = source.source;
                }
                
                pdfDoc = await loadingTask.promise;
                pageCount = pdfDoc.numPages;
                document.getElementById('total-pages').textContent = pageCount;
                
                await convertPagesToImages();
                
            } catch (error) {
                console.error('Error loading PDF:', error);
                flipbookDiv.innerHTML = `
                    <div style="text-align: center; padding: 100px 20px; color: #666;">
                        <h3>⚠️ Failed to Load PDF</h3>
                        <p>${error.message}</p>
                        <button onclick="window.location.href='/flipbook/upload.html'" style="margin-top: 20px; padding: 10px 20px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer;">
                            Try Another PDF
                        </button>
                    </div>
                `;
            }
        }
        
        // Convert PDF pages to images
        async function convertPagesToImages() {
            const flipbookDiv = document.getElementById('flipbook');
            flipbookDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>Preparing pages...</p></div>';
            
            pagesData = [];
            
            for (let i = 1; i <= pageCount; i++) {
                try {
                    const page = await pdfDoc.getPage(i);
                    const viewport = page.getViewport({ scale: 1.5 });
                    
                    const canvas = document.createElement('canvas');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    const ctx = canvas.getContext('2d');
                    
                    await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                    
                    const imgData = canvas.toDataURL('image/jpeg', 0.9);
                    pagesData.push(imgData);
                    
                    console.log(`Page ${i}/${pageCount} converted`);
                } catch (err) {
                    console.error(`Error converting page ${i}:`, err);
                }
            }
            
            createFlipbook();
        }
        
        // Create the interactive flipbook
        function createFlipbook() {
            const flipbookDiv = document.getElementById('flipbook');
            
            let html = '';
            for (let i = 0; i < pagesData.length; i++) {
                html += `
                    <div id="page-${i + 1}" style="background: white; display: flex; align-items: center; justify-content: center;">
                        <img src="${pagesData[i]}" style="max-width: 100%; height: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1);" alt="Page ${i + 1}">
                    </div>
                `;
            }
            
            flipbookDiv.innerHTML = html;
            flipbookDiv.style.width = '100%';
            flipbookDiv.style.height = '550px';
            flipbookDiv.style.background = '#e8e8e8';
            flipbookDiv.style.position = 'relative';
            flipbookDiv.style.overflow = 'hidden';
            
            // Initialize turn.js
            if ($ && $.fn && $.fn.turn) {
                $(flipbookDiv).turn({
                    width: Math.min(900, window.innerWidth - 100),
                    height: 550,
                    autoCenter: true,
                    display: 'single',
                    acceleration: true,
                    gradients: true,
                    elevation: 50,
                    when: {
                        turned: function(e, page) {
                            currentPage = page;
                            document.getElementById('current-page').textContent = currentPage;
                            updateButtons();
                        }
                    }
                });
                
                $(flipbookDiv).turn('page', 1);
            } else {
                setupFallbackViewer();
            }
            
            updateButtons();
        }
        
        function setupFallbackViewer() {
            let fallbackPage = 1;
            const flipbookDiv = document.getElementById('flipbook');
            
            flipbookDiv.innerHTML = `
                <div style="position: relative; height: 100%; display: flex; align-items: center; justify-content: center; background: #333;">
                    <button id="fb-prev" style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer;">◀</button>
                    <img id="fb-img" src="${pagesData[0]}" style="max-width: 80%; max-height: 90%; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">
                    <button id="fb-next" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer;">▶</button>
                </div>
            `;
            
            const img = document.getElementById('fb-img');
            const prev = document.getElementById('fb-prev');
            const next = document.getElementById('fb-next');
            
            prev.addEventListener('click', () => {
                if (fallbackPage > 1) {
                    fallbackPage--;
                    img.src = pagesData[fallbackPage - 1];
                    document.getElementById('current-page').textContent = fallbackPage;
                }
            });
            
            next.addEventListener('click', () => {
                if (fallbackPage < pagesData.length) {
                    fallbackPage++;
                    img.src = pagesData[fallbackPage - 1];
                    document.getElementById('current-page').textContent = fallbackPage;
                }
            });
        }
        
        function updateButtons() {
            const prevBtn = document.getElementById('prev-page');
            const nextBtn = document.getElementById('next-page');
            if (prevBtn) prevBtn.disabled = currentPage <= 1;
            if (nextBtn) nextBtn.disabled = currentPage >= pageCount;
        }
        
        function goToPrevPage() {
            if (currentPage > 1) {
                if ($ && $.fn && $.fn.turn) {
                    $('#flipbook').turn('page', currentPage - 1);
                } else {
                    currentPage--;
                    document.getElementById('current-page').textContent = currentPage;
                    updateButtons();
                }
            }
        }
        
        function goToNextPage() {
            if (currentPage < pageCount) {
                if ($ && $.fn && $.fn.turn) {
                    $('#flipbook').turn('page', currentPage + 1);
                } else {
                    currentPage++;
                    document.getElementById('current-page').textContent = currentPage;
                    updateButtons();
                }
            }
        }
        
        function toggleFullscreen() {
            const container = document.querySelector('.container');
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => {
                    console.error(`Fullscreen error: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }
        
        function downloadPDF() {
            if (currentPDFUrl) {
                const link = document.createElement('a');
                link.href = currentPDFUrl;
                link.download = 'flipbook.pdf';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } else {
                alert('Download not available for uploaded PDFs. Please use the "New Flipbook" button to upload again.');
            }
        }
        
        // Event listeners
        document.getElementById('prev-page')?.addEventListener('click', goToPrevPage);
        document.getElementById('next-page')?.addEventListener('click', goToNextPage);
        document.getElementById('fullscreen-btn')?.addEventListener('click', toggleFullscreen);
        document.getElementById('download-btn')?.addEventListener('click', downloadPDF);
        document.getElementById('new-flipbook')?.addEventListener('click', () => {
            window.location.href = '/flipbook/upload.html';
        });
        
        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') goToPrevPage();
            else if (e.key === 'ArrowRight') goToNextPage();
        });
        
        // Start
        loadPDF();
    </script>
</body>
</html>
